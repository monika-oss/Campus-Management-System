    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        if(window.lucide) lucide.createIcons();
        let facultyCurrentPage = 1;
        const ITEMS_PER_PAGE = 5;
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('admin')) return;

            // GSAP Transitions
            gsap.to("#topNavbar", { duration: 0.8, opacity: 1, ease: "power2.out", delay: 0.2 });
            gsap.to(".content-block", { duration: 0.8, opacity: 1, y: 0, ease: "power3.out", delay: 0.3 });

            // Sidebar Collapsible Toggle
            const sidebar = document.getElementById('adminSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            const closeBtn = document.getElementById('closeSidebar');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                });
            }
            }

            // Load Departments
            try {
                const depts = await api.get('/students/departments/');
                const fDept = document.getElementById('f_dept');
                const deptFilter = document.getElementById('deptFilter');
                
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = `${d.code} - ${d.name}`;
                    fDept.appendChild(opt);

                    const optEdit = document.createElement('option');
                    optEdit.value = d.id;
                    optEdit.textContent = `${d.code} - ${d.name}`;
                    document.getElementById('ef_dept').appendChild(optEdit);
                    
                    if (deptFilter) {
                        const optFilter = document.createElement('option');
                        optFilter.value = d.code;
                        optFilter.textContent = d.code;
                        deptFilter.appendChild(optFilter);
                        const optTopFilter = document.createElement('option');
                        optTopFilter.value = d.code;
                        optTopFilter.textContent = d.code;
                        document.getElementById('topDeptFilter')?.appendChild(optTopFilter);
                    }
                });
            } catch (e) {
                console.error(e);
            }

            await loadFaculty();

            const searchInput = document.getElementById('searchInput');
            const deptFilter = document.getElementById('deptFilter');
            if (searchInput) searchInput.addEventListener('input', loadFaculty);
            const empIdSearchInput = document.getElementById('empIdSearchInput');
            if (empIdSearchInput) empIdSearchInput.addEventListener('input', loadFaculty);
            const topSearchInput = document.getElementById('topSearchInput');
            if (topSearchInput) topSearchInput.addEventListener('input', loadFaculty);
            if (deptFilter) deptFilter.addEventListener('change', loadFaculty);
            const topDeptFilter = document.getElementById('topDeptFilter');
            if (topDeptFilter) topDeptFilter.addEventListener('change', loadFaculty);


            // Save Faculty
            document.getElementById('saveFacultyBtn').addEventListener('click', async () => {
                const data = {
                    name: document.getElementById('f_name').value,
                    email: document.getElementById('f_email').value,
                    department: document.getElementById('f_dept').value,
                    designation: document.getElementById('f_desig').value,
                };

                if(!data.name || !data.email || !data.department) {
                    utils.showToast("Required fields are missing", "error");
                    return;
                }

                try {
                    await api.post('/faculty/', data);
                    utils.showToast('Faculty added successfully', 'success');
                    utils.hideModal('addFacultyModal');
                    document.getElementById('facultyForm').reset();
                    await loadFaculty();
                } catch (e) {
                    utils.showToast('Error adding faculty', 'error');
                }
            });
        });
        async function loadFaculty() {
            try {
                const search = document.getElementById('searchInput')?.value || document.getElementById('empIdSearchInput')?.value || document.getElementById('topSearchInput')?.value || '';
                const dept = document.getElementById('deptFilter')?.value || document.getElementById('topDeptFilter')?.value || '';
                let url = '/faculty/';
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (dept) params.push(`department__code=${encodeURIComponent(dept)}`);
                if (params.length > 0) {
                    url += '?' + params.join('&');
                }
                const data = await api.get(url);
                window.facultyData = data;
                facultyCurrentPage = 1;
                renderFacultyTable();
            } catch (e) {}
        }

        function renderFacultyTable() {
            const tbody = document.querySelector('#facultyTable tbody');
            const data = window.facultyData || [];
            
            if (data.length) {
                const paginated = utils.paginateData(data, facultyCurrentPage, ITEMS_PER_PAGE);
                tbody.innerHTML = paginated.map(f => `
                    <tr class="hover:bg-slate-100/35 transition-colors">
                        <td class="py-3.5 px-4 font-semibold text-slate-800">${f.employee_id}</td>
                        <td class="py-3.5 px-4 font-medium">${f.name}</td>
                        <td class="py-3.5 px-4"><span class="px-2.5 py-0.5 bg-blue-50 text-blue-750 border border-blue-200 text-xs rounded-full font-medium">${f.department_details?.code || '-'}</span></td>
                        <td class="py-3.5 px-4 font-medium text-slate-650">${f.designation || '-'}</td>
                        <td class="py-3.5 px-4">${f.email}</td>
                        <td class="py-3.5 px-4 text-center">
                            <div class="relative inline-block text-left group/menu z-10 hover:z-50">
                                <button class="p-1.5 px-2 bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-200 rounded-lg transition-colors shadow-sm focus:outline-none">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <div class="absolute right-0 mt-1 origin-top-right w-36 bg-white border border-slate-100 rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all z-[60] flex flex-col p-1.5 scale-95 group-hover/menu:scale-100">
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors text-left w-full" onclick="viewFacultyDetails(${f.faculty_id})">
                                        <i class="bi bi-eye"></i> View Details
                                    </button>
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors text-left w-full" onclick="openEditFacultyModal(${f.faculty_id})">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </button>
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-rose-600 hover:bg-rose-50 rounded-lg transition-colors text-left w-full" onclick="deleteFaculty(${f.faculty_id})">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </td>
                    </tr>
                `).join('');
                
                utils.renderPagination('facultyPagination', data.length, ITEMS_PER_PAGE, facultyCurrentPage, (newPage) => {
                    facultyCurrentPage = newPage;
                    renderFacultyTable();
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-slate-400">No faculty members found.</td></tr>';
            }
        }

        window.viewFacultyDetails = function(id) {
            const f = window.facultyData?.find(item => item.faculty_id == id);
            if (f) {
                const cleanObj = {
                    'Name': f.name,
                    'Employee ID': f.employee_id,
                    'Email Address': f.email,
                    'Department': f.department_details ? `${f.department_details.code} - ${f.department_details.name}` : f.department,
                    'Designation': f.designation || 'N/A'
                };
                utils.showViewModal('Faculty Details', cleanObj);
            }
        }

        
        window.openEditFacultyModal = async function(id) {
            try {
                const f = await api.get('/faculty/' + id + '/');
                document.getElementById('ef_id').value = f.faculty_id;
                document.getElementById('ef_name').value = f.name;
                document.getElementById('ef_email').value = f.email;
                document.getElementById('ef_dept').value = f.department;
                document.getElementById('ef_desig').value = f.designation || '';
                utils.showModal('editFacultyModal');
            } catch(e) {
                utils.showToast('Error loading faculty details', 'error');
            }
        };

        document.getElementById('updateFacultyBtn').addEventListener('click', async () => {
            const form = document.getElementById('editFacultyForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            const id = document.getElementById('ef_id').value;
            const data = {
                name: document.getElementById('ef_name').value,
                email: document.getElementById('ef_email').value,
                department: document.getElementById('ef_dept').value,
                designation: document.getElementById('ef_desig').value,
            };
            try {
                await api.put('/faculty/' + id + '/', data);
                utils.showToast('Faculty updated successfully', 'success');
                utils.hideModal('editFacultyModal');
                loadFaculty();
            } catch (e) {
                utils.showToast('Error updating faculty', 'error');
            }
        });

        async function deleteFaculty(id) {
            if (confirm("Are you sure you want to delete this faculty member?")) {
                await api.delete(`/faculty/${id}/`);
                utils.showToast('Faculty deleted successfully', 'success');
                await loadFaculty();
            }
        }
    </script>
    <script src="../js/animations.js"></script>
</body>
</html>
