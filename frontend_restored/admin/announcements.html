<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Smart Campus</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .ant-input {
            border-radius: 6px !important;
        }
        .sidebar-item-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item-link:hover {
            transform: translateX(4px);
        }
        /* Collapsed Sidebar Styles */
        #adminSidebar, #studentSidebar, #facultySidebar {
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .collapsed-sidebar {
            width: 5rem !important; /* w-20 */
        }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text {
            display: none !important;
        }
        .collapsed-sidebar .sidebar-item-link {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .brand-logo-container {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .sidebar-item-link:hover {
            transform: none !important;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
</head>
<body class="h-screen flex bg-slate-50 overflow-hidden">

    <!-- Layout Wrapper -->
    <div class="flex h-screen w-full relative">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] shadow-xl fixed inset-y-0 left-0 lg:static h-[100dvh] transform -translate-x-full lg:translate-x-0 transition-transform duration-300" id="adminSidebar"><div class="flex-1 overflow-y-auto">
                <!-- Brand logo -->
                <div class="h-20 flex items-center px-4 border-b border-slate-800 gap-2 brand-logo-container justify-between">
                    <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                    <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text flex-1 whitespace-nowrap">Smart Campus</span>
                    <button id="closeSidebar" onclick="this.closest('aside').classList.add('-translate-x-full'); this.closest('aside').style.transform = ''; const ov = document.getElementById(this.closest('aside').id + 'Overlay'); if(ov) ov.classList.add('hidden');" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 shrink-0 block lg:hidden focus:outline-none"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <!-- Navigation menu -->
                <nav class="mt-6 px-3 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                    </a>
                    <a href="students.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="users" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Students</span>
                    </a>
                    <a href="faculty.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="graduation-cap" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Faculty</span>
                    </a>
                    
                    <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Attendance</span>
                    </a>
                    <a href="timetable.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="calendar-days" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Timetable</span>
                    </a>
                    <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Leave Requests</span>
                    </a>
                    <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="award" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Results</span>
                    </a>
                    <a href="announcements.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link">
                        <i data-lucide="megaphone" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Announcements</span>
                    </a>

                </nav>
            </div>
            
            <!-- Sidebar Footer / Logout -->
            <div class="p-4 border-t border-slate-800">
                <button class="w-full flex items-center justify-center gap-2 bg-slate-855 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                    <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
                </button>
            </div>
        </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden w-full">
            
            <!-- Top Navbar -->
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-30 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                    <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-base sm:text-xl font-extrabold text-slate-800 font-outfit truncate leading-tight">Notifications Management</h2>
                </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">U</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">User</span>
                    </div>
                </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto relative" id="scrollArea">

            <!-- Page Content -->
            <div class="p-6 lg:p-8 space-y-6 max-w-7xl w-full mx-auto" id="mainDashboard">
                
                <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                    <!-- Header -->
                    <div class="flex flex-col md:flex-row justify-between items-center gap-2 mb-6">
                        <h3 class="text-lg font-bold text-slate-850 font-poppins">Campus Announcements</h3>
                        <div class="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto justify-start md:justify-end">
                            <input type="text" id="searchInput" class="ant-input w-full sm:w-[200px] border border-slate-300 focus:border-blue-500 focus:outline-none transition-all" placeholder="Search by title...">
                            <button class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-550 hover:scale-[1.02] text-white font-semibold py-1.5 px-4 text-sm rounded-xl shadow-md transition-all" onclick="utils.showModal('addNotificationModal')">
                                <i data-lucide="megaphone" class="w-4 h-4"></i><span>Create Announcement</span>
                            </button>
                        </div>
                    </div>

                    <!-- Announcements Table -->
                    <div class="overflow-x-auto">
                        <table class="ant-table" id="notificationsTable">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider">
                                    <th class="py-3 px-4  ">Date</th>
                                    <th class="py-3 px-4  ">Title & Details</th>
                                    <th class="py-3 px-4  ">Audience</th>
                                    <th class="py-3 px-4  ">Status</th>
                                    <th class="py-3 px-4 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm text-slate-700">
                                <!-- Rendered dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Container -->
                    <div id="announcementsPagination" class="flex justify-end items-center gap-2 mt-4"></div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <!-- Create Notification Modal -->
    <div class="modal-overlay hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center" id="addNotificationModal">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full m-4 overflow-hidden border border-slate-100">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800 font-poppins">Create New Announcement</h3>
                <button class="text-slate-400 hover:text-slate-600 text-xl font-bold focus:outline-none" onclick="utils.hideModal('addNotificationModal')">×</button>
            </div>
            <!-- Modal Body -->
            <div class="p-6">
                <form id="notificationForm" class="space-y-4">
                    <div>
                        <label class="block text-slate-700 font-semibold mb-1 text-sm">Title*</label>
                        <input type="text" class="ant-input w-full border border-slate-300 focus:border-blue-500 focus:outline-none" id="n_title" placeholder="Enter headline/title" required>
                    </div>
                    <div>
                        <label class="block text-slate-700 font-semibold mb-1 text-sm">Description*</label>
                        <textarea class="ant-input w-full border border-slate-300 focus:border-blue-500 focus:outline-none" id="n_desc" rows="4" placeholder="Enter detailed description here..." required></textarea>
                    </div>
                    <div>
                        <label class="block text-slate-700 font-semibold mb-1 text-sm">Target Audience*</label>
                        <select class="ant-input w-full border border-slate-300 focus:border-blue-500 focus:outline-none" id="n_target" required>
                            <option value="all">All (Students & Faculty)</option>
                            <option value="student">Students Only</option>
                            <option value="faculty">Faculty Only</option>
                        </select>
                    </div>
                </form>
            </div>
            <!-- Modal Footer -->
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                <button class="px-4 py-2 border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-100 font-medium text-sm transition-colors" onclick="utils.hideModal('addNotificationModal')">Cancel</button>
                <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium text-sm transition-colors shadow-sm" id="saveNotificationBtn">Publish</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        if(window.lucide) lucide.createIcons();
        let announcementsCurrentPage = 1;
        const ITEMS_PER_PAGE = 6;
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('admin')) return;

            // Sidebar Collapsible Toggle
            const sidebar = document.getElementById('adminSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            }
            const closeBtn = document.getElementById('closeSidebar');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                });
            }

            await loadNotifications();

            document.getElementById('saveNotificationBtn').addEventListener('click', async () => {
                const title = document.getElementById('n_title').value;
                const description = document.getElementById('n_desc').value;
                const target_role = document.getElementById('n_target').value;

                if (!title || !description || !target_role) {
                    utils.showToast('Please fill all fields', 'error');
                    return;
                }

                try {
                    await api.post('/notifications/', { title, description, target_role });
                    utils.showToast('Notification published successfully', 'success');
                    utils.hideModal('addNotificationModal');
                    document.getElementById('notificationForm').reset();
                    await loadNotifications();
                } catch (e) {
                    utils.showToast('Error publishing notification', 'error');
                }
            });

            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.addEventListener('input', loadNotifications);
        });

        async function loadNotifications() {
            try {
                const search = document.getElementById('searchInput')?.value;
                let url = '/notifications/';
                if (search) {
                    url += `?search=${encodeURIComponent(search)}`;
                }
                const data = await api.get(url);
                window.notificationsData = data;
                announcementsCurrentPage = 1;
                renderNotificationsTable();
            } catch (e) {
                console.error("Error loading notifications", e);
            }
        }

        function renderNotificationsTable() {
            const tbody = document.querySelector('#notificationsTable tbody');
            const data = window.notificationsData || [];
            
            if (data.length) {
                const paginated = utils.paginateData(data, announcementsCurrentPage, ITEMS_PER_PAGE);
                tbody.innerHTML = paginated.map(n => {
                    const date = new Date(n.created_at).toLocaleDateString();
                    const id = n.notification_id || n.id;
                    const isActive = n.is_active;
                    return `
                        <tr>
                            <td class="py-3.5 px-4 font-semibold text-slate-550">${date}</td>
                            <td class="py-3.5 px-4">
                                <strong class="text-slate-800 text-sm block font-poppins">${n.title}</strong>
                                <p class="text-xs text-slate-500 mt-1 max-w-xl leading-relaxed">${n.description}</p>
                            </td>
                            <td class="py-3.5 px-4"><span class="px-2 py-0.5 bg-blue-50 text-blue-700 border border-blue-200 text-xs rounded font-medium capitalize">${n.target_role}</span></td>
                            <td class="py-3.5 px-4">
                                <span class="px-2 py-0.5 ${isActive ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-amber-50 text-amber-700 border border-amber-200'} text-xs rounded font-medium">${isActive ? 'Active' : 'Inactive'}</span>
                            </td>
                            <td class="py-3.5 px-4 text-center">
                                <div class="flex items-center justify-center gap-2">
                                    <button onclick="toggleNotificationActive(${id}, ${isActive})" class="text-xs font-semibold px-2.5 py-1 rounded-lg border transition-all ${isActive ? 'border-amber-200 text-amber-700 bg-amber-50 hover:bg-amber-100' : 'border-emerald-200 text-emerald-700 bg-emerald-50 hover:bg-emerald-100'}">
                                        ${isActive ? 'Deactivate' : 'Activate'}
                                    </button>
                                    <button onclick="deleteNotification(${id})" class="text-rose-600 hover:text-rose-800 p-1.5 hover:bg-rose-50 rounded-lg transition-colors" title="Delete Announcement">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
                
                utils.renderPagination('announcementsPagination', data.length, ITEMS_PER_PAGE, announcementsCurrentPage, (newPage) => {
                    announcementsCurrentPage = newPage;
                    renderNotificationsTable();
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-slate-400">No announcements found.</td></tr>';
                document.getElementById('announcementsPagination').innerHTML = '';
            }
            if(window.lucide) lucide.createIcons();
        }

        window.toggleNotificationActive = async function(id, currentStatus) {
            try {
                const newStatus = !currentStatus;
                await api.patch(`/notifications/${id}/`, { is_active: newStatus });
                utils.showToast(newStatus ? 'Announcement activated successfully!' : 'Announcement deactivated successfully!', 'success');
                await loadNotifications();
            } catch (e) {
                console.error(e);
                utils.showToast('Failed to update announcement status', 'error');
            }
        };

        window.deleteNotification = async function(id) {
            if (!confirm('Are you sure you want to delete this announcement?')) return;
            try {
                await api.delete(`/notifications/${id}/`);
                utils.showToast('Announcement deleted successfully!', 'success');
                await loadNotifications();
            } catch (e) {
                console.error(e);
                utils.showToast('Failed to delete announcement', 'error');
            }
        };
    </script>
    <script src="../js/animations.js"></script>
</body>
</html>
