<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Smart Campus</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item-link { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item-link:hover { transform: translateX(4px); }
        #facultySidebar { transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .collapsed-sidebar { width: 5rem !important; }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text { display: none !important; }
        .collapsed-sidebar .sidebar-item-link { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .brand-logo-container { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .sidebar-item-link:hover { transform: none !important; }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    </style>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
</head>
<body class="min-h-screen flex bg-slate-50 overflow-hidden">

    <div class="flex w-full min-h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <div id="facultySidebarOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[90] hidden lg:hidden"></div>
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] shadow-xl fixed inset-y-0 left-0 lg:static h-[100dvh] transform -translate-x-full lg:translate-x-0 transition-transform duration-300" id="facultySidebar"><div class="flex-1 overflow-y-auto">
                <div class="h-20 flex items-center px-4 border-b border-slate-800 gap-2 brand-logo-container justify-between">
                    <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                    <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text flex-1 whitespace-nowrap">Smart Campus</span>
                    <button id="closeSidebar" onclick="this.closest('aside').classList.add('-translate-x-full'); this.closest('aside').style.transform = ''; const ov = document.getElementById(this.closest('aside').id + 'Overlay'); if(ov) ov.classList.add('hidden');" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 shrink-0 block lg:hidden focus:outline-none"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <nav class="mt-6 px-3 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                    </a>
                    <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Mark Attendance</span>
                    </a>
                    <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Leave Approvals</span>
                    </a>
                    <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="file-text" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Manage Results</span>
                    </a>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-800">
                <button class="w-full flex items-center justify-center gap-2 bg-slate-850 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                    <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
                </button>
            </div>
        </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden w-full">
            
            <!-- Top Navbar -->
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-30 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                    <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-base sm:text-xl font-extrabold text-slate-800 font-outfit truncate leading-tight">Faculty Dashboard</h2>
                </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="notification-badge absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">F</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">Faculty</span>
                    </div>
                </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto px-6 lg:px-8 py-6 lg:py-8" id="mainDashboard">
                <div class="space-y-6 max-w-7xl w-full mx-auto">

                    <!-- Welcome Banner -->
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 text-white shadow-lg">
                        <h3 class="text-2xl font-bold font-outfit" id="welcomeMsg">Welcome back!</h3>
                        <p class="text-blue-100 mt-1 text-sm">Here's your today's overview.</p>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="stat-card bg-white rounded-xl border border-slate-100 shadow-sm p-6 flex items-center gap-5">
                            <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center">
                                <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-slate-500">My Students</p>
                                <p class="text-2xl font-bold text-slate-800" id="kpi-students">—</p>
                            </div>
                        </div>
                        <div class="stat-card bg-white rounded-xl border border-slate-100 shadow-sm p-6 flex items-center gap-5">
                            <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center">
                                <i data-lucide="calendar-check" class="w-6 h-6 text-green-600"></i>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-slate-500">Today's Classes</p>
                                <p class="text-2xl font-bold text-slate-800" id="kpi-classes">—</p>
                            </div>
                        </div>
                        <div class="stat-card bg-white rounded-xl border border-slate-100 shadow-sm p-6 flex items-center gap-5">
                            <div class="w-12 h-12 rounded-xl bg-amber-50 flex items-center justify-center">
                                <i data-lucide="clipboard-list" class="w-6 h-6 text-amber-600"></i>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-slate-500">Pending Leaves</p>
                                <p class="text-2xl font-bold text-slate-800" id="kpi-leaves">—</p>
                            </div>
                        </div>
                    </div>

                    <!-- Today's Classes -->
                    <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                            <h3 class="text-base font-bold text-slate-800">Today's Timetable</h3>
                        </div>
                        <div id="todayClasses" class="divide-y divide-slate-50">
                            <p class="text-center py-10 text-slate-400 text-sm">Loading classes...</p>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        if(window.lucide) lucide.createIcons();
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('faculty')) return;

            const user = auth.getUser();
            document.getElementById('userName').textContent = user.name || 'Faculty';
            document.getElementById('userAvatar').textContent = (user.name || 'F')[0].toUpperCase();
            document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name || 'Faculty'}!`;

            // Sidebar Toggle
            const sidebar = document.getElementById('facultySidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed-sidebar'));
            }

            // Load stats
            try {
                if (user.faculty_id) {
                    // Today's classes
                    const classes = await api.get(`/faculty/${user.faculty_id}/today_classes/`);
                    document.getElementById('kpi-classes').textContent = classes.length;

                    const container = document.getElementById('todayClasses');
                    if (classes.length === 0) {
                        container.innerHTML = '<p class="text-center py-10 text-slate-400 text-sm">No classes scheduled for today.</p>';
                    } else {
                        container.innerHTML = classes.map(c => `
                            <div class="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
                                <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                                    <div class="w-10 h-10 rounded-xl bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-sm">P${c.period_number}</div>
                                    <div>
                                        <p class="font-semibold text-slate-800">${c.subject_details ? c.subject_details.subject_name : 'Subject '+c.subject}</p>
                                        <p class="text-xs text-slate-400">Year ${c.year} · Section ${c.section}</p>
                                    </div>
                                </div>
                                <a href="attendance.html" class="px-4 py-1.5 text-xs font-semibold bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors">Mark Attendance</a>
                            </div>
                        `).join('');
                    }

                    // Students count
                    const students = await api.get(`/faculty/${user.faculty_id}/students/`);
                    document.getElementById('kpi-students').textContent = students.length;
                }
            } catch(e) {
                console.error(e);
                document.getElementById('todayClasses').innerHTML = '<p class="text-center py-10 text-slate-400 text-sm">Could not load timetable.</p>';
            }

            // Pending leaves
            try {
                const leaves = await api.get('/leave/requests/?status=pending');
                document.getElementById('kpi-leaves').textContent = leaves.length;
            } catch(e) {
                document.getElementById('kpi-leaves').textContent = '0';
            }
        });
    </script>
    <script src="../js/animations.js?v=2"></script>
</body>
</html>
