    <script>
        if(window.lucide) lucide.createIcons();
        let studentsCurrentPage = 1;
        const ITEMS_PER_PAGE = 5;
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('admin')) return;

            // Sidebar Collapsible Toggle
            const sidebar = document.getElementById('adminSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            const closeBtn = document.getElementById('closeSidebar');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                });
            }
            }

            // Load Departments and populate dropdowns
            async function loadDepartments() {
                try {
                    const depts = await api.get('/students/departments/');
                    const deptFilter = document.getElementById('deptFilter');
                    const sDept = document.getElementById('s_dept');
                    
                    // Reset dropdowns
                    deptFilter.innerHTML = '<option value="">All Depts</option>';
                    if(document.getElementById('topDeptFilter')) document.getElementById('topDeptFilter').innerHTML = '<option value="">All Depts</option>';
                    sDept.innerHTML = '<option value="">Select Department</option>';

                    depts.forEach(d => {
                        const optFilter = document.createElement('option');
                        optFilter.value = d.code;
                        optFilter.textContent = d.code;
                        deptFilter.appendChild(optFilter);
                        const optTopFilter = document.createElement('option');
                        optTopFilter.value = d.code;
                        optTopFilter.textContent = d.code;
                        document.getElementById('topDeptFilter')?.appendChild(optTopFilter);

                        const optForm = document.createElement('option');
                        optForm.value = d.id;
                        optForm.textContent = `${d.code} - ${d.name}`;
                        sDept.appendChild(optForm);

                        const optEdit = document.createElement('option');
                        optEdit.value = d.id;
                        optEdit.textContent = `${d.code} - ${d.name}`;
                        document.getElementById('e_dept').appendChild(optEdit);
                    });
                } catch (e) {
                    console.error("Error loading departments", e);
                }
            }
            loadDepartments();
            loadStudents();

            // Set up search and filter events
            if(document.getElementById('searchInput')) document.getElementById('searchInput').addEventListener('input', loadStudents);
            if(document.getElementById('regSearchInput')) document.getElementById('regSearchInput').addEventListener('input', loadStudents);
            if(document.getElementById('topSearchInput')) document.getElementById('topSearchInput').addEventListener('input', loadStudents);
            if(document.getElementById('deptFilter')) document.getElementById('deptFilter').addEventListener('change', loadStudents);
            if(document.getElementById('topDeptFilter')) document.getElementById('topDeptFilter').addEventListener('change', loadStudents);

            document.getElementById('saveStudentBtn').addEventListener('click', async (e) => {
                const form = document.getElementById('studentForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                
                const data = {
                    name: document.getElementById('s_name').value,
                    roll_number: document.getElementById('s_reg').value,
                    email: document.getElementById('s_email').value,
                    department: document.getElementById('s_dept').value,
                    year: document.getElementById('s_year').value,
                };

                if(!data.name || !data.roll_number || !data.email || !data.department || !data.year) {
                    utils.showToast("All fields are required", "error");
                    return;
                }

                try {
                    await api.post('/students/', data);
                    utils.showToast('Student added successfully', 'success');
                    utils.hideModal('addStudentModal');
                    document.getElementById('studentForm').reset();
                    loadStudents();
                } catch (e) {
                    utils.showToast('Error adding student', 'error');
                }
            });

            document.getElementById('saveDeptBtn').addEventListener('click', async (e) => {
                const form = document.getElementById('deptForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                
                const data = {
                    code: document.getElementById('d_code').value.toUpperCase(),
                    name: document.getElementById('d_name').value
                };

                try {
                    await api.post('/students/departments/', data);
                    utils.showToast('Department added successfully', 'success');
                    utils.hideModal('addDeptModal');
                    document.getElementById('deptForm').reset();
                    await loadDepartments();
                } catch (e) {
                    utils.showToast('Error adding department (Code might already exist)', 'error');
                }
            });
        });
        async function loadStudents() {
            try {
                utils.showTableSkeleton('#studentsTable tbody', 6, ITEMS_PER_PAGE);
                const search = document.getElementById('searchInput')?.value || document.getElementById('regSearchInput')?.value || document.getElementById('topSearchInput')?.value || '';
                const dept = document.getElementById('deptFilter')?.value || document.getElementById('topDeptFilter')?.value || '';
                let url = '/students/';
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (dept) params.push(`department__code=${encodeURIComponent(dept)}`);
                if (params.length > 0) {
                    url += '?' + params.join('&');
                }
                const data = await api.get(url);
                window.studentsData = data;
                studentsCurrentPage = 1;
                renderStudentsTable();
            } catch (e) {
                console.error(e);
            }
        }

        function renderStudentsTable() {
            const tbody = document.querySelector('#studentsTable tbody');
            const data = window.studentsData || [];
            
            if (data.length) {
                const paginated = utils.paginateData(data, studentsCurrentPage, ITEMS_PER_PAGE);
                tbody.innerHTML = paginated.map(s => `
                    <tr class="hover:bg-slate-100/35 transition-colors">
                        <td class="py-3.5 px-4 font-semibold text-slate-800">${s.roll_number}</td>
                        <td class="py-3.5 px-4 font-medium">${s.name}</td>
                        <td class="py-3.5 px-4"><span class="px-2.5 py-0.5 bg-blue-50 text-blue-700 border border-blue-200 text-xs rounded-full font-medium">${s.department_details?.code || '-'}</span></td>
                        <td class="py-3.5 px-4 font-medium text-slate-600">${s.year} Year</td>
                        <td class="py-3.5 px-4">${s.email}</td>
                        <td class="py-3.5 px-4 text-center">
                            <div class="relative inline-block text-left group/menu z-10 hover:z-50">
                                <button class="p-1.5 px-2 bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-200 rounded-lg transition-colors shadow-sm focus:outline-none">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <div class="absolute right-0 mt-1 origin-top-right w-36 bg-white border border-slate-100 rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all z-[60] flex flex-col p-1.5 scale-95 group-hover/menu:scale-100">
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors text-left w-full" onclick="viewStudentDetails(${s.student_id})">
                                        <i class="bi bi-eye"></i> View Details
                                    </button>
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors text-left w-full" onclick="openEditStudentModal(${s.student_id})">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </button>
                                    <button class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-rose-600 hover:bg-rose-50 rounded-lg transition-colors text-left w-full" onclick="deleteStudent(${s.student_id})">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </td>
                    </tr>
                `).join('');
                
                utils.renderPagination('studentsPagination', data.length, ITEMS_PER_PAGE, studentsCurrentPage, (newPage) => {
                    studentsCurrentPage = newPage;
                    renderStudentsTable();
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-slate-400">No students found.</td></tr>';
                document.getElementById('studentsPagination').innerHTML = '';
            }
        }

        window.viewStudentDetails = function(id) {
            const s = window.studentsData?.find(item => item.student_id == id);
            if (s) {
                const cleanObj = {
                    'Name': s.name,
                    'Register Number': s.roll_number,
                    'Email Address': s.email,
                    'Department': s.department_details ? `${s.department_details.code} - ${s.department_details.name}` : s.department,
                    'Year': `${s.year} Year`
                };
                utils.showViewModal('Student Details', cleanObj);
            }
        }
        
        
        window.openEditStudentModal = async function(id) {
            try {
                const s = await api.get('/students/' + id + '/');
                document.getElementById('e_id').value = s.student_id;
                document.getElementById('e_name').value = s.name;
                document.getElementById('e_reg').value = s.roll_number;
                document.getElementById('e_email').value = s.email;
                document.getElementById('e_dept').value = s.department;
                document.getElementById('e_year').value = s.year;
                utils.showModal('editStudentModal');
            } catch(e) {
                utils.showToast('Error loading student details', 'error');
            }
        };

        document.getElementById('updateStudentBtn').addEventListener('click', async () => {
            const form = document.getElementById('editStudentForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            const id = document.getElementById('e_id').value;
            const data = {
                name: document.getElementById('e_name').value,
                roll_number: document.getElementById('e_reg').value,
                email: document.getElementById('e_email').value,
                department: document.getElementById('e_dept').value,
                year: document.getElementById('e_year').value,
            };
            try {
                await api.patch('/students/' + id + '/', data);
                utils.showToast('Student updated successfully', 'success');
                utils.hideModal('editStudentModal');
                loadStudents();
            } catch (e) {
                utils.showToast('Error updating student', 'error');
            }
        });

        async function deleteStudent(id) {
            if(confirm("Are you sure you want to delete this student profile?")) {
                await api.delete(`/students/${id}/`);
                utils.showToast('Student deleted successfully', 'success');
                loadStudents();
            }
        }
    </script>
    <script src="../js/animations.js"></script>
</body>
</html>
