<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - Smart Campus</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar-item-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item-link:hover {
            transform: translateX(4px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .ant-input, .ant-select-selector {
            border-radius: 8px !important;
        }
        /* Collapsed Sidebar Styles */
        #adminSidebar, #studentSidebar, #facultySidebar {
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .collapsed-sidebar {
            width: 5rem !important; /* w-20 */
        }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text {
            display: none !important;
        }
        .collapsed-sidebar .sidebar-item-link {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .brand-logo-container {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .sidebar-item-link:hover {
            transform: none !important;
        }
    
        /* Hide all scrollbars visually but keep scroll functionality */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="min-h-[100dvh] flex bg-slate-50 font-inter text-slate-800">

    <!-- Sidebar -->
    <div id="adminSidebarOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[90] hidden lg:hidden"></div>
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] shadow-xl fixed inset-y-0 left-0 lg:static h-[100dvh] transform -translate-x-full lg:translate-x-0 transition-transform duration-300" id="adminSidebar"><div class="flex-1 overflow-y-auto">
            <!-- Brand logo -->
            <div class="h-20 flex items-center px-4 border-b border-slate-800 gap-2 brand-logo-container justify-between">
                <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text flex-1 whitespace-nowrap">Smart Campus</span>
                <button id="closeSidebar" onclick="this.closest('aside').classList.add('-translate-x-full'); this.closest('aside').style.transform = ''; const ov = document.getElementById(this.closest('aside').id + 'Overlay'); if(ov) ov.classList.add('hidden');" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 shrink-0 block lg:hidden focus:outline-none"><i data-lucide="x" class="w-4 h-4 shrink-0"></i></button>
            </div>
            <!-- Navigation menu -->
            <nav class="mt-6 px-3 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                </a>
                <a href="students.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="users" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Students</span>
                </a>
                <a href="faculty.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="graduation-cap" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Faculty</span>
                </a>
                <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Attendance</span>
                </a>
                <a href="timetable.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link active">
                    <i data-lucide="calendar-days" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Timetable</span>
                </a>
                <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Leave Requests</span>
                </a>
                <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="award" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Results</span>
                </a>
                <a href="announcements.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                    <i data-lucide="megaphone" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Announcements</span>
                </a>
            </nav>
        </div>
        
        <!-- Sidebar Footer / Logout -->
        <div class="p-4 border-t border-slate-800">
            <button class="w-full flex items-center justify-center gap-2 bg-slate-850 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
            </button>
        </div>
    </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-[100dvh] overflow-hidden w-full">
        <!-- Top Navbar -->
                    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-30 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div class="min-w-0 flex-1">
                    <h2 class="text-base sm:text-xl font-extrabold text-slate-800 font-outfit truncate leading-tight ">Timetable Management</h2>
                    <p class="text-slate-500 mt-1 text-sm truncate hidden sm:block">Manage class timetables and assign faculty</p>
                </div>
            </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">A</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">User</span>
                    </div>
                </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto relative" id="scrollArea">

        <!-- Page Content -->
        <div class="p-6 lg:p-8 space-y-6 max-w-7xl w-full mx-auto content-block" id="mainDashboard">

            <div class="glass-card p-6 rounded-2xl border border-slate-100 shadow-sm">
                <!-- Filters and Add Actions Row -->
                <div class="flex flex-col md:flex-row justify-between items-center gap-2 mb-6">
                    <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                        <select id="filterDept" class="ant-input w-full sm:w-[120px] border border-slate-300 focus:border-blue-500 focus:outline-none transition-all">
                            <option value="">All Depts</option>
                        </select>
                        <select id="filterYear" class="ant-input w-full sm:w-[120px] border border-slate-300 focus:border-blue-500 focus:outline-none transition-all">
                            <option value="">All Years</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                        <select id="filterDay" class="ant-input w-full sm:w-[120px] border border-slate-300 focus:border-blue-500 focus:outline-none transition-all">
                            <option value="">All Days</option>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                        </select>
                    </div>
                    <button class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-550 hover:scale-[1.02] text-white font-semibold py-1.5 px-4 text-sm rounded-xl shadow-md transition-all self-end md:self-auto mt-2 md:mt-0" onclick="openAddModal()">
                        <i data-lucide="plus" class="w-4 h-4 shrink-0"></i><span>Timetable</span>
                    </button>
                </div>

                <!-- Timetable Table -->
                <div class="overflow-x-auto" >
                    <table class="ant-table" id="timetableTable">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider">
                                <th class="py-3 px-4  ">Day</th>
                                <th class="py-3 px-4  ">Period</th>
                                <th class="py-3 px-4  ">Timing</th>
                                <th class="py-3 px-4  ">Class (Yr)</th>
                                <th class="py-3 px-4  ">Dept</th>
                                <th class="py-3 px-4  ">Subject</th>
                                <th class="py-3 px-4  ">Faculty</th>
                                <th class="py-3 px-4 text-center  ">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm text-slate-700" id="timetableTableBody">
                            <!-- Data rendered by JS -->
                        </tbody>
                    </table>
                </div>
                <!-- Pagination Container -->
                <div id="timetablePagination" class="flex justify-end items-center gap-2 mt-4"></div>
            </div>

        </div>
    </main>
        </div>

    <!-- Add Timetable Modal -->
    <div id="addTimetableModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center modal-overlay">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg m-4 overflow-hidden transform scale-95" onclick="event.stopPropagation()" id="addTimetableModalContent">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800 self-start md:self-auto">Assign Timetable</h3>
                <button class="text-slate-400 hover:text-slate-600 transition-colors modal-close p-1 hover:bg-slate-200 rounded-lg" onclick="utils.hideModal('addTimetableModal')">
                    <i data-lucide="x" class="w-4 h-4 shrink-0"></i>
                </button>
            </div>
            <div class="p-6 pt-4">
                <form id="addTimetableForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Department</label>
                            <select id="ttDept" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                                <option value="">Select Dept</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Year</label>
                            <select id="ttYear" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                                <option value="1">1st Year</option>
                                <option value="2">2nd Year</option>
                                <option value="3">3rd Year</option>
                                <option value="4">4th Year</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Day</label>
                            <select id="ttDay" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                                <option value="Saturday">Saturday</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Period Number</label>
                            <input type="number" id="ttPeriod" required min="1" max="8" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5 flex justify-between items-center">
                                Subject
                            </label>
                            <select id="ttSubject" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                                <option value="">Select Subject</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Faculty</label>
                            <select id="ttFaculty" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                                <option value="">Select Faculty</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Start Time <span class="text-red-500">*</span></label>
                            <input type="time" id="ttStartTime" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">End Time <span class="text-red-500">*</span></label>
                            <input type="time" id="ttEndTime" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onclick="utils.hideModal('addTimetableModal')" class="px-5 py-2.5 text-slate-600 font-semibold hover:bg-slate-100 rounded-xl transition-all">Cancel</button>
                        <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md shadow-blue-500/20 transition-all">Assign</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Manage Subjects Modal -->
    <div id="manageSubjectsModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="manageSubjectsModalContent">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-800">Manage Subjects</h3>
                <button class="text-slate-400 hover:text-slate-600 transition-colors p-1 hover:bg-slate-200 rounded-lg" onclick="utils.hideModal('manageSubjectsModal')">
                    <i data-lucide="x" class="w-4 h-4 shrink-0"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="addSubjectForm" class="flex gap-2 mb-6">
                    <input type="text" id="newSubjectName" required placeholder="Enter new subject name..." class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-sm">
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl shadow-md shadow-blue-500/20 transition-all shrink-0">Add</button>
                </form>
                <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Existing Subjects</div>
                <div id="manageSubjectsList" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Subjects will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script src="../js/admin/timetable.js?v=6"></script>

    <!-- Add/Edit Period Modal -->
    <div id="periodModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0" id="periodModalOverlay" onclick="closePeriodModal()"></div>
        <div class="relative bg-white p-6 lg:p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 transform scale-95 transition-all duration-300 opacity-0" id="periodModalContent">
            <h3 class="text-xl font-bold text-slate-800 mb-6 font-outfit" id="periodModalTitle">Add Period</h3>
            <form id="periodForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Period Number <span class="text-red-500">*</span></label>
                    <input type="number" id="periodNumber" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Start Time <span class="text-red-500">*</span></label>
                        <input type="time" id="startTime" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">End Time <span class="text-red-500">*</span></label>
                        <input type="time" id="endTime" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" class="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-100 transition-colors" onclick="closePeriodModal()">Cancel</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-medium shadow-lg shadow-indigo-600/20 transition-all active:scale-[0.98]">Save Period</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/animations.js"></script>
</body>
</html>
