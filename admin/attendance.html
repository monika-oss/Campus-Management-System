<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Smart Campus</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar-item-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item-link:hover {
            transform: translateX(4px);
        }
        /* Collapsed Sidebar Styles */
        #adminSidebar, #studentSidebar, #facultySidebar {
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .collapsed-sidebar {
            width: 5rem !important; /* w-20 */
        }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text {
            display: none !important;
        }
        .collapsed-sidebar .sidebar-item-link {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .brand-logo-container {
            justify-content: center;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        .collapsed-sidebar .sidebar-item-link:hover {
            transform: none !important;
        }
    
        /* Hide all scrollbars visually but keep scroll functionality */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="h-[100dvh] flex bg-slate-50 overflow-hidden">

    <!-- Layout Wrapper -->
    <div class="flex h-[100dvh] w-full relative">
        
        <!-- Sidebar -->
        <div id="adminSidebarOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[90] hidden lg:hidden"></div>
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] shadow-xl fixed inset-y-0 left-0 lg:static h-[100dvh] transform -translate-x-full lg:translate-x-0 transition-transform duration-300" id="adminSidebar"><div class="flex-1 overflow-y-auto">
                <!-- Brand logo -->
                <div class="h-20 flex items-center px-4 border-b border-slate-800 gap-2 brand-logo-container justify-between">
                    <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                    <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text flex-1 whitespace-nowrap">Smart Campus</span>
                    <button id="closeSidebar" onclick="this.closest('aside').classList.add('-translate-x-full'); this.closest('aside').style.transform = ''; const ov = document.getElementById(this.closest('aside').id + 'Overlay'); if(ov) ov.classList.add('hidden');" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 shrink-0 block lg:hidden focus:outline-none"><i data-lucide="x" class="w-4 h-4 shrink-0"></i></button>
                </div>
                <!-- Navigation menu -->
                <nav class="mt-6 px-3 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                    </a>
                    <a href="students.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="users" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Students</span>
                    </a>
                    <a href="faculty.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="graduation-cap" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Faculty</span>
                    </a>
                    
                    <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link">
                        <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Attendance</span>
                    </a>
                    <a href="timetable.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="calendar-days" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Timetable</span>
                    </a>
                    <a href="leave.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Leave Requests</span>
                    </a>
                    <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="award" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Results</span>
                    </a>
                    <a href="announcements.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="megaphone" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Announcements</span>
                    </a>

                </nav>
            </div>
            
            <!-- Sidebar Footer / Logout -->
            <div class="p-4 border-t border-slate-800">
                <button class="w-full flex items-center justify-center gap-2 bg-slate-850 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                    <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
                </button>
            </div>
        </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col h-[100dvh] overflow-hidden w-full">
            
            <!-- Top Navbar -->
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-30 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                    <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-base sm:text-xl font-extrabold text-slate-800 font-outfit truncate leading-tight self-start md:self-auto">Attendance Logs</h2>
                </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">U</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">User</span>
                    </div>
                </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto relative" id="scrollArea">

            <!-- Page Content -->
            <div class="p-6 lg:p-8 space-y-6 max-w-7xl w-full mx-auto" id="mainDashboard">
                
                <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-2 mb-6">
                        <h3 class="text-lg font-bold text-slate-800 font-poppins self-start md:self-auto">Campus-wide Attendance Records</h3>
                        
                    </div>

                    <!-- Attendance Table -->
                    <div class="overflow-x-auto" style="overflow-y: clip">
                        <table class="ant-table" id="attendanceTable">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider">
                                    <th class="py-3 px-4  ">Date</th>
                                    <th class="py-3 px-4  ">Student Name</th>
                                    <th class="py-3 px-4  ">Subject</th>
                                    <th class="py-3 px-4  ">Status</th>
                                    <th class="py-3 px-4 text-center  ">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm text-slate-700">
                                <!-- Rendered dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Container -->
                    <div id="attendancePagination" class="flex justify-end items-center gap-2 mt-4"></div>
                </div>
            </div>
        </main>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        if(window.lucide) lucide.createIcons();
        let attendanceData = [];
        let attendanceCurrentPage = 1;
        const ITEMS_PER_PAGE = 5;

        async function loadDepartments() {
            try {
                const depts = await api.get('/students/departments/');
                const deptFilter = document.getElementById('deptFilter');
                if (deptFilter) {
                    depts.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.code;
                        opt.textContent = d.code;
                        deptFilter.appendChild(opt);
                    });
                }
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('admin')) return;

            const sidebar = document.getElementById('adminSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            const closeBtn = document.getElementById('closeSidebar');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                });
            }
            }
            
            await loadDepartments();
            await loadAttendanceData();

            const searchInput = document.getElementById('searchInput');
            const deptFilter = document.getElementById('deptFilter');
            if (searchInput) searchInput.addEventListener('input', loadAttendanceData);
            if (deptFilter) deptFilter.addEventListener('change', loadAttendanceData);
        });

        async function loadAttendanceData() {
            try {
                const search = document.getElementById('searchInput')?.value;
                const dept = document.getElementById('deptFilter')?.value;
                let url = '/attendance/';
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (dept) params.push(`department__code=${encodeURIComponent(dept)}`);
                if (params.length > 0) {
                    url += '?' + params.join('&');
                }
                
                attendanceData = await api.get(url);
                if (attendanceData.results) attendanceData = attendanceData.results;
                attendanceCurrentPage = 1;
                renderAttendanceTable();
            } catch (e) {
                console.error('Error loading attendance', e);
            }
        }

        function renderAttendanceTable() {
            const tbody = document.querySelector('#attendanceTable tbody');
            if (!attendanceData || attendanceData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-slate-400">No attendance logs found.</td></tr>';
                document.getElementById('attendancePagination').innerHTML = '';
                return;
            }

            const paginated = utils.paginateData(attendanceData, attendanceCurrentPage, ITEMS_PER_PAGE);
            tbody.innerHTML = paginated.map(a => `
                <tr>
                    <td class="py-3.5 px-4 font-semibold text-slate-800">${a.date}</td>
                    <td class="py-3.5 px-4 font-medium">${a.student_details?.name || 'N/A'} <span class="text-xs text-slate-400 font-normal">(${a.student_details?.roll_number || ''})</span></td>
                    <td class="py-3.5 px-4">${a.subject_details?.subject_name || 'General Class'}</td>
                    <td class="py-3.5 px-4">
                        <span class="px-2.5 py-1 text-xs font-semibold rounded-full ${a.status === 'present' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : a.status === 'absent' ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}">${a.status}</span>
                    </td>
                    <td class="py-3.5 px-4 text-center whitespace-nowrap">
                        <div class="relative inline-block text-left">
                            <button class="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" type="button">
                                <i class="bi bi-three-dots-vertical"></i>
                            </button>
                            <div class="action-menu-dropdown absolute right-0 mt-2 w-36 bg-white rounded-xl shadow-lg border border-slate-100 opacity-0 invisible scale-95 transition-all duration-200 z-50 overflow-hidden origin-top-right">
                                <div class="p-1">
                                    <button onclick="viewAttendance(${a.attendance_id})" class="w-full text-left px-3 py-2 text-sm text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors flex items-center gap-2">
                                        <i class="bi bi-eye"></i> View
                                    </button>
                                    <button onclick="deleteAttendance(${a.attendance_id})" class="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');

            utils.renderPagination('attendancePagination', attendanceData.length, ITEMS_PER_PAGE, attendanceCurrentPage, (newPage) => {
                attendanceCurrentPage = newPage;
                renderAttendanceTable();
            });
        }

        window.viewAttendance = function(id) {
            const att = attendanceData.find(a => a.attendance_id == id);
            if(att) utils.showViewModal('Attendance Details', att);
        };

        window.deleteAttendance = async function(id) {
            if(confirm('Are you sure you want to delete this record?')) {
                try {
                    await api.delete('/attendance/' + id + '/');
                    utils.showToast('Deleted successfully', 'success');
                    loadAttendanceData();
                } catch(e) {
                    utils.showToast('Error deleting', 'error');
                }
            }
        };
    </script>
    <script src="../js/animations.js"></script>
</body>
</html>
