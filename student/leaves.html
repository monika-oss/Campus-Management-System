<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves - Smart Campus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item-link { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item-link:hover { transform: translateX(4px); }
        #studentSidebar { transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .collapsed-sidebar { width: 5rem !important; }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text { display: none !important; }
        .collapsed-sidebar .sidebar-item-link { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .brand-logo-container { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .sidebar-item-link:hover { transform: none !important; }
        /* Modal */
        #leaveModal { display: none; }
        #leaveModal.open { display: flex; }
    
        /* Hide all scrollbars visually but keep scroll functionality */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
</head>
<body class="min-h-[100dvh] flex bg-slate-50 overflow-hidden">

    <div class="flex w-full min-h-[100dvh] overflow-hidden">

        <!-- Sidebar -->
        <div id="studentSidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-[90] hidden lg:hidden"></div>
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] shadow-xl fixed inset-y-0 left-0 lg:static h-[100dvh] transform -translate-x-full lg:translate-x-0 transition-transform duration-300" id="studentSidebar"><div class="flex-1 overflow-y-auto">
                <div class="h-20 flex items-center justify-between px-4 border-b border-slate-800 brand-logo-container w-full">
                    <div class="flex items-center gap-2">
                        <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                        <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text whitespace-nowrap">Smart Campus</span>
                    </div>
                    <button onclick="this.closest('aside').classList.add('-translate-x-full'); this.closest('aside').style.transform = ''; const ov = document.getElementById(this.closest('aside').id + 'Overlay'); if(ov) ov.classList.add('hidden');" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 shrink-0 block lg:hidden focus:outline-none"><i data-lucide="x" class="w-4 h-4 shrink-0"></i></button>
                </div>
                <nav class="mt-6 px-3 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link nav-item">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                    </a>
                    <a href="leaves.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link nav-item">
                        <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">My Leaves</span>
                    </a>
                    <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link nav-item">
                        <i data-lucide="graduation-cap" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Academic Grades</span>
                    </a>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-800">
                <button class="w-full flex items-center justify-center gap-2 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                    <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
                </button>
            </div>
        </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-[100dvh] overflow-hidden w-full">

            <!-- Top Navbar -->
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-30 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                    <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-lg sm:text-xl font-extrabold text-slate-800 font-outfit truncate max-w-[150px] sm:max-w-none">My Leaves</h2>
                </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">U</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">User</span>
                    </div>
                </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto px-6 lg:px-8 py-6 lg:py-8" id="mainDashboard">
                <div class="max-w-5xl w-full mx-auto space-y-6">
                    
                    <!-- Header with Apply button -->
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <h3 class="text-lg font-bold text-white font-outfit">Leave Applications</h3>
                            <p class="text-xs text-slate-300">View status and submit new leave requests.</p>
                        </div>
                        <button onclick="openModal()" class="flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md shadow-blue-500/20 transition-all text-sm">
                            <i data-lucide="plus" class="w-4 h-4"></i> Apply Leave
                        </button>
                    </div>

                    <div id="leaveCards">
                        <p class="text-center py-10 text-slate-400 text-sm">Loading your leaves...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Apply Leave Modal -->
    <div id="leaveModal" class="fixed inset-0 z-50 items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 lg:p-8">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-slate-800 font-outfit">Apply for Leave</h3>
                <button onclick="closeModal()" class="p-1.5 hover:bg-slate-100 rounded-lg transition-colors text-slate-500"><i data-lucide="x" class="w-4 h-4 shrink-0"></i></button>
            </div>
            <form id="leaveForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Leave Type</label>
                    <select id="leaveType" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                        <option value="medical">Medical</option>
                        <option value="personal">Personal</option>
                        <option value="academic">Academic</option>
                        <option value="emergency">Emergency</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="isPartialDay" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                    <label for="isPartialDay" class="text-sm font-semibold text-slate-700 cursor-pointer">Partial Day / Specific Periods</label>
                </div>

                <div id="periodSelection" class="grid grid-cols-2 gap-4 hidden">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">From Period</label>
                        <select id="fromPeriod" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                            <option value="">Select</option>
                            <option value="1">Period 1</option>
                            <option value="2">Period 2</option>
                            <option value="3">Period 3</option>
                            <option value="4">Period 4</option>
                            <option value="5">Period 5</option>
                            <option value="6">Period 6</option>
                            <option value="7">Period 7</option>
                            <option value="8">Period 8</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">To Period</label>
                        <select id="toPeriod" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                            <option value="">Select</option>
                            <option value="1">Period 1</option>
                            <option value="2">Period 2</option>
                            <option value="3">Period 3</option>
                            <option value="4">Period 4</option>
                            <option value="5">Period 5</option>
                            <option value="6">Period 6</option>
                            <option value="7">Period 7</option>
                            <option value="8">Period 8</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label id="fromDateLabel" class="block text-sm font-semibold text-slate-700 mb-1.5">From Date</label>
                        <input type="date" id="fromDate" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                    </div>
                    <div id="toDateContainer">
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">To Date</label>
                        <input type="date" id="toDate" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Reason</label>
                    <textarea id="leaveReason" required rows="3" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all resize-none" placeholder="Explain your reason..."></textarea>
                </div>
                <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md shadow-blue-500/20 transition-all">Submit Application</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        if(window.lucide) lucide.createIcons();
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('student')) return;
            currentUser = auth.getUser();
            document.getElementById('userName').textContent = currentUser.name || 'Student';
            document.getElementById('userAvatar').textContent = (currentUser.name || 'S')[0].toUpperCase();

            const sidebar = document.getElementById('studentSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth >= 1024) {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            }

            // Set default dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fromDate').value = today;
            document.getElementById('toDate').value = today;

            // Handle partial day toggle
            const isPartialDay = document.getElementById('isPartialDay');
            const periodSelection = document.getElementById('periodSelection');
            const toDateContainer = document.getElementById('toDateContainer');
            const fromDateLabel = document.getElementById('fromDateLabel');
            const toDateInput = document.getElementById('toDate');
            const fromPeriod = document.getElementById('fromPeriod');
            const toPeriod = document.getElementById('toPeriod');

            isPartialDay.addEventListener('change', (e) => {
                if (e.target.checked) {
                    periodSelection.classList.remove('hidden');
                    toDateContainer.classList.add('hidden');
                    toDateInput.removeAttribute('required');
                    fromDateLabel.textContent = 'Date';
                    fromPeriod.setAttribute('required', 'true');
                    toPeriod.setAttribute('required', 'true');
                } else {
                    periodSelection.classList.add('hidden');
                    toDateContainer.classList.remove('hidden');
                    toDateInput.setAttribute('required', 'true');
                    fromDateLabel.textContent = 'From Date';
                    fromPeriod.removeAttribute('required');
                    toPeriod.removeAttribute('required');
                }
            });

            await loadLeaves();

            document.getElementById('leaveForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    let payload = {
                        leave_type: document.getElementById('leaveType').value,
                        from_date: document.getElementById('fromDate').value,
                        to_date: isPartialDay.checked ? document.getElementById('fromDate').value : document.getElementById('toDate').value,
                        reason: document.getElementById('leaveReason').value,
                        is_partial_day: isPartialDay.checked
                    };
                    if (isPartialDay.checked) {
                        payload.from_period = fromPeriod.value;
                        payload.to_period = toPeriod.value;
                    }
                    await api.post('/leave/', payload);
                    utils.showToast('Leave applied successfully!', 'success');
                    closeModal();
                    loadLeaves();
                } catch(err) {
                    let errMsg = 'Failed to apply for leave';
                    if (err && err.data) {
                        if (err.data.non_field_errors && err.data.non_field_errors.length > 0) {
                            errMsg = err.data.non_field_errors[0];
                        } else if (typeof err.data === 'object') {
                            const vals = Object.values(err.data);
                            if (vals.length > 0 && Array.isArray(vals[0])) {
                                errMsg = vals[0][0];
                            } else if (vals.length > 0 && typeof vals[0] === 'string') {
                                errMsg = vals[0];
                            }
                        }
                    }
                    utils.showToast(errMsg, 'error');
                }
            });
        });

        async function loadLeaves() {
            try {
                const data = await api.get('/leave/my/');
                const container = document.getElementById('leaveCards');
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-16 flex flex-col items-center justify-center">
                            <div class="w-16 h-16 bg-slate-800/60 rounded-2xl flex items-center justify-center mb-4 border border-slate-700/50">
                                <i data-lucide="clipboard-list" class="w-8 h-8 text-slate-300"></i>
                            </div>
                            <p class="text-slate-200 font-medium">No leave applications yet</p>
                            <p class="text-slate-300 text-sm mt-1 mb-5">Click "Apply Leave" to submit your first request</p>
                            <button onclick="openModal()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md shadow-blue-500/20 transition-all text-sm">
                                <i data-lucide="plus" class="w-4 h-4"></i> Apply Leave
                            </button>
                        </div>
                    `;
                    if(window.lucide) lucide.createIcons();
                    return;
                }
                container.innerHTML = data.map(l => `
                    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5 flex items-start justify-between gap-4">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 rounded-xl ${l.leave_type === 'medical' ? 'bg-red-50' : l.leave_type === 'emergency' ? 'bg-orange-50' : 'bg-blue-50'} flex items-center justify-center flex-shrink-0">
                                <i data-lucide="${l.leave_type === 'medical' ? 'heart-pulse' : l.leave_type === 'emergency' ? 'alert-triangle' : 'calendar'}" class="w-4 h-4 shrink-0 ${l.leave_type === 'medical' ? 'text-red-500' : l.leave_type === 'emergency' ? 'text-orange-500' : 'text-blue-500'}"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="font-bold text-slate-800 capitalize">${l.leave_type} Leave</span>
                                    <span class="inline-block whitespace-nowrap px-2.5 py-0.5 text-xs font-semibold rounded-full ${l.status === 'approved' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : l.status === 'rejected' ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}">${l.status === 'pending_advisor' ? 'Pending Advisor' : l.status === 'pending_hod' ? 'Pending HOD' : l.status}</span>
                                </div>
                                    <div class="text-sm text-slate-500 mt-0.5">
                                        <i data-lucide="calendar" class="w-3.5 h-3.5 inline mr-1 opacity-70"></i>
                                        ${l.is_partial_day ? 
                                            `${utils.formatDate(l.from_date)} (Periods ${l.from_period} to ${l.to_period})` :
                                            `${utils.formatDate(l.from_date)} to ${utils.formatDate(l.to_date)}`
                                        }
                                    </div>
                                <p class="text-sm text-slate-600 mt-1">${l.reason}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
                if(window.lucide) lucide.createIcons();
            } catch(e) {
                document.getElementById('leaveCards').innerHTML = '<p class="text-center py-10 text-red-400 text-sm">Failed to load leaves.</p>';
            }
        }

        function openModal() { document.getElementById('leaveModal').classList.add('open'); }
        function closeModal() { document.getElementById('leaveModal').classList.remove('open'); }
    </script>
    <script src="../js/animations.js?v=2"></script>
</body>
</html>
