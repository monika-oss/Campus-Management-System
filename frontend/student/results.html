<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Grades - Smart Campus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item-link { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item-link:hover { transform: translateX(4px); }
        #studentSidebar { transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .collapsed-sidebar { width: 5rem !important; }
        .collapsed-sidebar .brand-text,
        .collapsed-sidebar .nav-text,
        .collapsed-sidebar .logout-text { display: none !important; }
        .collapsed-sidebar .sidebar-item-link { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .brand-logo-container { justify-content: center; padding-left: 0 !important; padding-right: 0 !important; }
        .collapsed-sidebar .sidebar-item-link:hover { transform: none !important; }
    </style>
    <link rel="stylesheet" href="../css/animations.css?v=7">
    <link rel="stylesheet" href="../css/premium-theme.css?v=7">
</head>
<body class="min-h-screen flex bg-slate-50 overflow-hidden">

    <div class="flex w-full min-h-screen overflow-hidden">

        <!-- Sidebar -->
        <div id="studentSidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-[90] hidden lg:hidden"></div>
        <aside class="w-64 bg-slate-900 border-r border-slate-800 text-slate-200 flex flex-col justify-between flex-shrink-0 z-[100] fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out shadow-xl" id="studentSidebar">
            <div>
                <div class="h-20 flex items-center justify-between px-4 border-b border-slate-800 brand-logo-container w-full">
                    <div class="flex items-center gap-2">
                        <i data-lucide="school" class="w-8 h-8 text-blue-400 shrink-0"></i>
                        <span class="text-lg font-bold text-white tracking-wider font-outfit brand-text whitespace-nowrap">Smart Campus</span>
                    </div>
                    <button class="close-sidebar-btn shrink-0 lg:hidden text-slate-400 hover:text-white transition-colors p-1 rounded-md hover:bg-slate-800 focus:outline-none">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <nav class="mt-6 px-3 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Dashboard</span>
                    </a>
                    <a href="leaves.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-200 hover:bg-slate-800 hover:text-white transition-all font-medium sidebar-item-link">
                        <i data-lucide="clipboard-list" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">My Leaves</span>
                    </a>
                    <a href="results.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-blue-600 shadow-md shadow-blue-600/20 font-medium sidebar-item-link">
                        <i data-lucide="graduation-cap" class="w-4 h-4 flex-shrink-0"></i><span class="nav-text">Academic Grades</span>
                    </a>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-800">
                <button class="w-full flex items-center justify-center gap-2 hover:bg-red-700 hover:text-white text-slate-200 py-2.5 rounded-lg transition-all font-medium border border-slate-700" onclick="auth.logout()">
                    <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i><span class="logout-text">Logout</span>
                </button>
            </div>
        </aside>
        <script>if(window.lucide) lucide.createIcons();</script>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden w-full">

            <!-- Top Navbar -->
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm flex justify-center sticky top-0 z-50 px-6 lg:px-8" id="topNavbar">
                <div class="max-w-7xl w-full flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
                    <button id="sidebarToggle" class="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors block lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-lg sm:text-xl font-extrabold text-slate-800 font-outfit truncate max-w-[150px] sm:max-w-none">Academic Grades</h2>
                </div>
                    <div class="flex items-center gap-3 sm:gap-6 shrink-0">
                    <div class="relative cursor-pointer hover:text-blue-600 transition-colors flex items-center justify-center" id="bellNotify">
                        <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 border-l border-slate-150 pl-3 sm:pl-6">
                        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm" id="userAvatar">U</div>
                        <span class="font-semibold text-slate-700 text-sm hidden sm:block" id="userName">User</span>
                    </div>
                </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto px-6 lg:px-8 py-6 lg:py-8" id="mainDashboard">
                <div class="max-w-5xl w-full mx-auto space-y-8" id="resultsContainer">
                    <p class="text-center py-10 text-slate-400 text-sm">Loading your grades...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js?v=9"></script>
    <script src="../js/utils.js?v=6"></script>
    <script src="../js/auth.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.checkAuth() || !auth.hasRole('student')) return;
            const user = auth.getUser();
            document.getElementById('userName').textContent = user.name || 'Student';
            document.getElementById('userAvatar').textContent = (user.name || 'S')[0].toUpperCase();

            // Sidebar setup
            const sidebar = document.getElementById('studentSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if(sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('collapsed-sidebar');
                    }
                });
            const closeBtn = document.getElementById('closeSidebar');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                });
            }
            }

            try {
                const results = await api.get(`/students/${user.student_id}/results/`);
                const container = document.getElementById('resultsContainer');
                
                if (results.length === 0) {
                    container.innerHTML = `<div class="bg-white p-6 lg:p-8 rounded-2xl shadow-sm border border-slate-100 text-center text-slate-500">No grades have been published yet.</div>`;
                    return;
                }

                // Group by semester
                const grouped = {};
                results.forEach(r => {
                    if (!grouped[r.semester]) grouped[r.semester] = [];
                    grouped[r.semester].push(r);
                });

                container.innerHTML = '';
                
                Object.keys(grouped).sort((a,b)=>b-a).forEach(sem => {
                    const sResults = grouped[sem];
                    
                    let rowsHTML = sResults.map(r => {
                        let pct = (r.marks_obtained / r.max_marks) * 100;
                        let colorClass = pct >= 80 ? 'text-emerald-600' : (pct >= 50 ? 'text-blue-600' : 'text-rose-600');
                        return `
                        <div class="flex items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors last:border-0">
                            <div>
                                <h4 class="font-bold text-slate-800">${r.subject_details?.subject_name}</h4>
                                <p class="text-xs text-slate-500 mt-0.5">Max Marks: ${r.max_marks}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-bold ${colorClass}">${r.marks_obtained}</span>
                                <span class="text-sm font-medium text-slate-500"> / ${r.max_marks}</span>
                            </div>
                        </div>`;
                    }).join('');
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                            <div class="bg-slate-800 px-6 py-4 flex items-center justify-between">
                                <h3 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="book-open" class="w-4 h-4 text-blue-400"></i> Semester ${sem}</h3>
                            </div>
                            <div>
                                ${rowsHTML}
                            </div>
                        </div>
                    `;
                });
                
                if(window.lucide) lucide.createIcons();
            } catch(e) {
                console.error(e);
                document.getElementById('resultsContainer').innerHTML = `<p class="text-center text-red-500">Failed to load grades. Please try again later.</p>`;
            }
        });
    </script>
</body>
</html>
