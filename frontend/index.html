<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus Management</title>
    <meta name="description" content="Smart Campus Management — your modern academic portal and analytics dashboard.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue-core:   #3b82f6;
            --blue-light:  #60a5fa;
            --indigo:      #6366f1;
            --purple:      #8b5cf6;
            --bg-deep:     #050d1a;
            --bg-mid:      #0b1528;
            --glass-bg:    rgba(255,255,255,0.065);
            --glass-border:rgba(255,255,255,0.13);
            --text-primary:#f0f6ff;
            --text-muted:  #94a3b8;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Canvas particle layer */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Morphing blob lights */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            animation: morphBlob 12s ease-in-out infinite alternate;
        }
        #blob1 { width:520px; height:520px; background:radial-gradient(circle,#1d4ed8 0%,transparent 70%); top:-160px; left:-160px; animation-delay:0s; }
        #blob2 { width:600px; height:600px; background:radial-gradient(circle,#4f46e5 0%,transparent 70%); bottom:-200px; right:-200px; animation-delay:-4s; }
        #blob3 { width:380px; height:380px; background:radial-gradient(circle,#0ea5e9 0%,transparent 70%); top:45%; left:55%; animation-delay:-8s; }

        @keyframes morphBlob {
            0%   { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1)   rotate(0deg); }
            50%  { border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%; transform: scale(1.08) rotate(8deg); }
            100% { border-radius: 70% 30% 50% 50% / 40% 70% 30% 60%; transform: scale(0.95) rotate(-6deg); }
        }

        /* Scan-line grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* Page layout */
        .page-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        /* Login card */
        #loginCard {
            width: 100%;
            max-width: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 44px 44px 40px;
            box-shadow:
                0 0 0 1px rgba(59,130,246,0.08),
                0 32px 80px rgba(0,0,0,0.55),
                0 0 80px rgba(59,130,246,0.06) inset;
            opacity: 0;
            transform: translateY(32px) scale(0.96);
            position: relative;
            overflow: hidden;
        }

        /* Inner shimmer sweep */
        #loginCard::before {
            content: '';
            position: absolute;
            top: -60%; left: -60%;
            width: 60%; height: 220%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.07) 50%, transparent 60%);
            transform: skewX(-20deg);
            animation: cardShimmer 6s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes cardShimmer {
            0%,100% { left: -60%; }
            50%      { left: 160%; }
        }

        /* Glowing top border accent */
        #loginCard::after {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue-core), var(--indigo), transparent);
            opacity: 0.7;
        }

        /* Logo icon */
        #logoIcon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(99,102,241,0.15));
            border: 1px solid rgba(99,102,241,0.35);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 28px rgba(59,130,246,0.25), 0 0 0 8px rgba(59,130,246,0.06);
            position: relative;
            opacity: 0;
        }
        /* pulse ring */
        #logoIcon::after {
            content: '';
            position: absolute; inset: -8px;
            border-radius: 26px;
            border: 1.5px solid rgba(99,102,241,0.35);
            animation: logoPulse 2.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { transform: scale(1);    opacity: 0.5; }
            50%      { transform: scale(1.12); opacity: 0;   }
        }

        /* Branding */
        .brand-header { text-align: center; margin-bottom: 36px; }

        #titleText {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem; font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f6ff 30%, var(--blue-light) 70%, var(--indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            min-height: 2.5rem;
        }
        #subText {
            color: var(--text-muted);
            font-size: 0.85rem; font-weight: 300;
            margin-top: 6px; letter-spacing: 0.2px;
            opacity: 0;
        }

        /* Typewriter cursor */
        .cursor-blink {
            display: inline-block;
            width: 2px; height: 1.1em;
            background: var(--blue-light);
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.9s steps(1) infinite;
        }
        @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

        /* Field labels */
        .field-label {
            display: block;
            font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #7c8fa8; margin-bottom: 8px;
        }

        /* Inputs */
        .form-row { opacity: 0; transform: translateY(14px); margin-bottom: 20px; }
        .input-wrap { position: relative; }

        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            caret-color: var(--blue-light);
        }
        .field-input::placeholder { color: #4d6080; }
        .field-input:hover {
            border-color: rgba(99,102,241,0.3);
            background: rgba(255,255,255,0.06);
        }
        .field-input:focus {
            border-color: var(--blue-core);
            background: rgba(59,130,246,0.07);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.16), 0 0 20px rgba(59,130,246,0.1);
        }
        .field-input.pr-pad { padding-right: 44px; }

        .input-glow {
            position: absolute; inset: 0;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(59,130,246,0.18);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s;
        }
        .field-input:focus + .input-glow { opacity: 1; }

        /* Password toggle */
        #togglePassword {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #4d6080; display: flex; align-items: center;
            transition: color 0.2s; padding: 4px;
        }
        #togglePassword:hover { color: var(--blue-light); }

        /* Errors */
        .field-error {
            font-size: 0.75rem; color: #f87171;
            margin-top: 5px;
            display: none; align-items: center; gap: 4px;
        }
        .field-error.show { display: flex; }

        /* Forgot link */
        .forgot-link {
            font-size: 0.75rem; color: var(--blue-light);
            text-decoration: none; font-weight: 500;
            transition: color 0.2s; float: right; margin-top: 6px;
        }
        .forgot-link:hover { color: #93c5fd; }

        /* Submit button */
        #loginBtn {
            width: 100%; height: 50px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            border: 1px solid rgba(99,102,241,0.5);
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 600; letter-spacing: 0.4px;
            cursor: pointer; margin-top: 10px;
            position: relative; overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
            box-shadow: 0 8px 28px rgba(59,130,246,0.3);
            opacity: 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        #loginBtn:hover {
            box-shadow: 0 12px 40px rgba(59,130,246,0.5), 0 0 0 1px rgba(99,102,241,0.7);
        }
        #loginBtn:disabled { cursor: not-allowed; opacity: 0.75; }
        #loginBtn::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        #loginBtn:not(:disabled):hover::before { left: 160%; }

        /* Ripple */
        .ripple {
            position: absolute; border-radius: 50%;
            transform: scale(0);
            background: rgba(255,255,255,0.25);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        /* Spinner */
        .btn-spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loginBtn.loading .btn-spinner { display: block; }
        #loginBtn.loading .btn-text    { display: none; }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            color: #2d3f58; font-size: 0.75rem;
            margin: 20px 0 16px; opacity: 0;
        }
        .divider::before,.divider::after {
            content:''; flex:1; height:1px;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
        }

        /* Role pills */
        .role-hint {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
            opacity: 0;
        }
        .role-pill {
            font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
            padding: 4px 10px; border-radius: 99px; border: 1px solid;
            cursor: default; transition: transform 0.2s, box-shadow 0.2s;
        }
        .role-pill:hover { transform: translateY(-2px); }
        .role-pill.admin   { color:#60a5fa; border-color:rgba(96,165,250,0.3);  background:rgba(96,165,250,0.08); }
        .role-pill.faculty { color:#a78bfa; border-color:rgba(167,139,250,0.3); background:rgba(167,139,250,0.08); }
        .role-pill.student { color:#34d399; border-color:rgba(52,211,153,0.3);  background:rgba(52,211,153,0.08); }

        /* Toast */
        #toast {
            position: fixed; top: 24px; right: 24px; z-index: 9999;
            display: flex; align-items: center; gap: 10px;
            padding: 14px 20px; border-radius: 14px;
            font-size: 0.85rem; font-weight: 500;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            transform: translateX(140%);
            max-width: 340px;
        }
        #toast.success { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:#6ee7b7; }
        #toast.error   { background:rgba(239,68,68,0.12);  border:1px solid rgba(239,68,68,0.3);  color:#fca5a5; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="blob" id="blob1"></div>
    <div class="blob" id="blob2"></div>
    <div class="blob" id="blob3"></div>

    <div class="grid-overlay"></div>

    <div id="toast" role="alert" aria-live="polite"></div>

    <div class="page-wrapper">
        <div id="loginCard">

            <div class="brand-header">
                <div id="logoIcon">
                    <i data-lucide="graduation-cap" style="width:32px;height:32px;color:#60a5fa;stroke-width:1.8;"></i>
                </div>
                <h1 id="titleText"></h1>
                <p id="subText">Your modern academic portal &amp; analytics dashboard</p>
            </div>

            <form id="loginForm" novalidate autocomplete="off">

                <div class="form-row" id="emailRow">
                    <label class="field-label" for="email">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" id="email" class="field-input" placeholder="you@campus.edu" required autocomplete="username">
                        <div class="input-glow"></div>
                    </div>
                    <div class="field-error" id="emailError">
                        <i data-lucide="alert-circle" style="width:12px;height:12px;flex-shrink:0;"></i>
                        Enter a valid email address
                    </div>
                </div>

                <div class="form-row" id="passwordRow">
                    <label class="field-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" class="field-input pr-pad" placeholder="••••••••" required autocomplete="current-password">
                        <div class="input-glow"></div>
                        <button type="button" id="togglePassword" aria-label="Toggle password visibility">
                            <i data-lucide="eye" style="width:16px;height:16px;"></i>
                        </button>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div class="field-error" id="passwordError">
                            <i data-lucide="alert-circle" style="width:12px;height:12px;flex-shrink:0;"></i>
                            Password is required
                        </div>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" id="loginBtn">
                    <div class="btn-spinner"></div>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <div class="divider" id="divider">Available Roles</div>

            <div class="role-hint" id="rolePills">
                <span class="role-pill admin">&#128274; Admin</span>
                <span class="role-pill faculty">&#127979; Faculty</span>
                <span class="role-pill student">&#127891; Student</span>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js?v=5"></script>
    <script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        /* ── Particle System ── */
        const canvas = document.getElementById('particleCanvas');
        const ctx    = canvas.getContext('2d');
        let W, H, particles = [];
        const COLORS = ['rgba(59,130,246,','rgba(99,102,241,','rgba(14,165,233,','rgba(139,92,246,'];

        function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() { this.reset(true); }
            reset(init) {
                this.x = Math.random() * W;
                this.y = init ? Math.random() * H : H + 10;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = -(Math.random() * 0.4 + 0.15);
                this.r  = Math.random() * 1.8 + 0.6;
                this.alpha = 0;
                this.maxAlpha = Math.random() * 0.45 + 0.1;
                this.life = 0;
                this.maxLife = Math.random() * 300 + 200;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life++;
                const half = this.maxLife * 0.3;
                this.alpha = this.life < half
                    ? (this.life / half) * this.maxAlpha
                    : ((this.maxLife - this.life) / (this.maxLife - half)) * this.maxAlpha;
                if (this.life >= this.maxLife) this.reset(false);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.fill();
            }
        }
        for (let i = 0; i < 55; i++) particles.push(new Particle());

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d  = Math.sqrt(dx*dx + dy*dy);
                    if (d < 110) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(99,102,241,${(1 - d/110) * 0.06})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        (function animateParticles() {
            ctx.clearRect(0,0,W,H);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animateParticles);
        })();

        /* ── Typewriter ── */
        function typeWriter(el, text, speed, cb) {
            el.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor-blink';
            el.appendChild(cursor);
            let i = 0;
            const iv = setInterval(() => {
                el.insertBefore(document.createTextNode(text[i++]), cursor);
                if (i >= text.length) {
                    clearInterval(iv);
                    setTimeout(() => { cursor.remove(); if(cb) cb(); }, 700);
                }
            }, speed);
        }

        /* ── Init icons ── */
        if(window.lucide) lucide.createIcons();

        /* ── GSAP Master Timeline ── */
        const tl = gsap.timeline({ delay: 0 });

        tl.to('.blob', { opacity: 0.45, duration: 1.4, stagger: 0.2, ease: 'power2.out' }, 0);

        tl.to('#loginCard', {
            opacity: 1, y: 0, scale: 1,
            duration: 1.0, ease: 'expo.out'
        }, 0.2);

        tl.fromTo('#logoIcon',
            { y: -24, opacity: 0, scale: 0.7 },
            { y: 0, opacity: 1, scale: 1, duration: 0.75, ease: 'back.out(1.8)' },
        0.45);

        tl.call(() => {
            const titleEl = document.getElementById('titleText');
            gsap.to(titleEl, { opacity: 1, duration: 0 });
            typeWriter(titleEl, 'Smart Campus', 55);
        }, null, 0.85);

        tl.fromTo('#subText',
            { y: 8, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' },
        1.2);

        tl.to('.form-row', {
            opacity: 1, y: 0,
            duration: 0.55, stagger: 0.12, ease: 'power3.out'
        }, 1.35);

        tl.to('#loginBtn', { opacity: 1, duration: 0.45, ease: 'power2.out' }, 1.65);

        tl.to(['#divider','#rolePills'], { opacity: 1, duration: 0.5, stagger: 0.1, ease: 'power2.out' }, 1.8);

        /* ── Magnetic button ── */
        const btn = document.getElementById('loginBtn');
        btn.addEventListener('mousemove', (e) => {
            const r = btn.getBoundingClientRect();
            gsap.to(btn, {
                x: (e.clientX - (r.left + r.width/2))  * 0.18,
                y: (e.clientY - (r.top  + r.height/2)) * 0.18,
                duration: 0.3, ease: 'power2.out'
            });
        });
        btn.addEventListener('mouseleave', () => {
            gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1,0.5)' });
        });

        /* Click ripple */
        btn.addEventListener('click', (e) => {
            if (btn.disabled) return;
            const r = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(r.width, r.height);
            Object.assign(ripple.style, {
                width: size + 'px', height: size + 'px',
                left: (e.clientX - r.left - size/2) + 'px',
                top:  (e.clientY - r.top  - size/2) + 'px'
            });
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 620);
        });

        /* ── Input focus micro-animations ── */
        document.querySelectorAll('.field-input').forEach(inp => {
            inp.addEventListener('focus', () => gsap.to(inp.closest('.input-wrap'), { scale: 1.012, duration: 0.25, ease: 'power2.out' }));
            inp.addEventListener('blur',  () => gsap.to(inp.closest('.input-wrap'), { scale: 1,     duration: 0.3,  ease: 'power2.out' }));
        });

        /* ── Password toggle (360° spin) ── */
        const toggleBtn = document.getElementById('togglePassword');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const show = passInput.type === 'password';
            passInput.type = show ? 'text' : 'password';
            toggleBtn.innerHTML = show
                ? '<i data-lucide="eye-off" style="width:16px;height:16px;"></i>'
                : '<i data-lucide="eye"     style="width:16px;height:16px;"></i>';
            if(window.lucide) lucide.createIcons();
            gsap.fromTo(toggleBtn, { rotate: 0 }, { rotate: 360, duration: 0.35, ease: 'power2.out' });
        });

        /* ── Toast ── */
        const toastEl = document.getElementById('toast');
        let toastTimer;
        function showToast(msg, type = 'success') {
            clearTimeout(toastTimer);
            toastEl.className = type;
            toastEl.textContent = msg;
            gsap.fromTo(toastEl,
                { x: '140%', opacity: 0 },
                { x: '0%',   opacity: 1, duration: 0.5, ease: 'expo.out' }
            );
            toastTimer = setTimeout(() => {
                gsap.to(toastEl, { x: '140%', opacity: 0, duration: 0.4, ease: 'expo.in' });
            }, 3500);
        }

        /* ── Role redirect ── */
        function redirectBasedOnRole(role) {
            if      (role === 'admin')   window.location.href = 'admin/dashboard.html';
            else if (role === 'faculty') window.location.href = 'faculty/dashboard.html';
            else if (role === 'student') window.location.href = 'student/dashboard.html';
            else                         window.location.href = 'index.html';
        }

        // Already logged in?
        const savedToken = localStorage.getItem('access_token');
        if (savedToken) {
            const savedUser = auth.getUser();
            if (savedUser) redirectBasedOnRole(savedUser.role);
        }

        /* ── Form submit ── */
        const loginForm  = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const passError  = document.getElementById('passwordError');

        // Automatically trim whitespace from email (useful for copy-pasting)
        emailInput.addEventListener('input', function() {
            this.value = this.value.trim();
        });
        emailInput.addEventListener('blur', function() {
            this.value = this.value.trim();
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            let ok = true;
            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailError.classList.add('show');
                gsap.to('#emailRow', { keyframes:{x:[-8,8,-6,6,-3,0]}, duration: 0.4, ease:'power1.inOut' });
                ok = false;
            } else { emailError.classList.remove('show'); }

            if (!passInput.value) {
                passError.classList.add('show');
                gsap.to('#passwordRow', { keyframes:{x:[-8,8,-6,6,-3,0]}, duration: 0.4, ease:'power1.inOut' });
                ok = false;
            } else { passError.classList.remove('show'); }

            if (!ok) return;

            btn.classList.add('loading');
            btn.disabled = true;
            gsap.to(btn, { scale: 0.97, duration: 0.15, yoyo: true, repeat: 1 });

            try {
                const user = await auth.login(emailInput.value, passInput.value);
                showToast('Access Granted! Redirecting…', 'success');
                gsap.to('#loginCard', {
                    y: -40, opacity: 0, scale: 0.94,
                    duration: 0.75, ease: 'power4.in',
                    onComplete: () => redirectBasedOnRole(user.role)
                });
            } catch (err) {
                btn.classList.remove('loading');
                btn.disabled = false;
                showToast('Invalid credentials. Please try again.', 'error');
                gsap.to('#loginCard', {
                    duration: 0.08, x: 12, repeat: 7, yoyo: true,
                    ease: 'power1.inOut',
                    onComplete: () => gsap.set('#loginCard', { x: 0 })
                });
                [emailInput, passInput].forEach(inp => {
                    gsap.fromTo(inp,
                        { borderColor:'#ef4444', boxShadow:'0 0 0 3px rgba(239,68,68,0.25)' },
                        { borderColor:'', boxShadow:'', duration:1.2, delay: 0, clearProps:'all' }
                    );
                });
            }
        });

    });
    </script>
</body>
</html>
